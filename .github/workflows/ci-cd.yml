name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_PATH: Moongazing.OrionRelay.sln

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x', '10.0.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}
      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release
      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --no-restore --configuration Release --verbosity normal

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}
      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release
      - name: Pack
        # Packs the solution rather than an enumerated list of projects. Every non-shipping
        # project (tests, sample, benchmarks) sets IsPackable=false, so this produces exactly
        # the src/ packages - and a newly added sub-package ships automatically instead of being
        # silently left out of the release until someone notices it missing from NuGet.
        run: dotnet pack ${{ env.SOLUTION_PATH }} --no-build --configuration Release -o ./nupkgs
      - name: Verify every packable project produced a package
        run: |
          expected=$(find src -name '*.csproj' -exec grep -L '<IsPackable>false' {} + | wc -l)
          actual=$(find ./nupkgs -name '*.nupkg' -not -name '*.symbols.nupkg' | wc -l)
          echo "Packable src projects: $expected"
          echo "Packages produced:     $actual"
          find ./nupkgs -name '*.nupkg' -printf '  %f\n' | sort
          if [ "$expected" -ne "$actual" ]; then
            echo "::error::Expected $expected packages but produced $actual. Refusing to publish a partial set."
            exit 1
          fi
      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkgs/*.nupkg" --api-key "${{ secrets.NUGET }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "./nupkgs/*.nupkg" --source github --skip-duplicate
